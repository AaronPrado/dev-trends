dev_trends:
  target: dev
  outputs:
    dev:
      type: spark
      method: session
      host: localhost
      schema: default
      threads: 1
      # El método session construye su propia SparkSession: sin estos parámetros
      # no tiene Delta habilitado y no puede leer las tablas Delta.
      server_side_parameters:
        spark.sql.extensions: "io.delta.sql.DeltaSparkSessionExtension"
        spark.sql.catalog.spark_catalog: "org.apache.spark.sql.delta.catalog.DeltaCatalog"
        # hadoop-aws habilita s3a. Inerte si DEV_TRENDS_DATA_ROOT apunta local.
        spark.jars.packages: "io.delta:delta-spark_2.12:3.2.0,org.apache.hadoop:hadoop-aws:3.3.4"
        spark.sql.warehouse.dir: "{{ env_var('DEV_TRENDS_DATA_ROOT') }}/gold"
        # Credenciales por la cadena por defecto del SDK:
        spark.hadoop.fs.s3a.aws.credentials.provider: "com.amazonaws.auth.DefaultAWSCredentialsProviderChain"
        spark.hadoop.fs.s3a.endpoint: "s3.{{ env_var('AWS_REGION', 'eu-west-1') }}.amazonaws.com"
