name: dev_trends
version: "0.1.0"
config-version: 2
profile: dev_trends

model-paths: ["models"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

vars:
  # Silver lo escribe Spark, no dbt; dbt lo consume como entrada externa por ruta.
  silver_path: "{{ env_var('DEV_TRENDS_DATA_ROOT') }}/silver"

models:
  dev_trends:
    +file_format: delta
    staging:
      +materialized: view
    marts:
      +materialized: table

seeds:
  dev_trends:
    +file_format: delta
