name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml

      - uses: actions/setup-java@v4
        with:
          java-version: "11"
          distribution: "temurin"

      - name: Cache ivy2 (Delta JARs)
        uses: actions/cache@v4
        with:
          path: ~/.ivy2/cache
          key: ivy2-delta-${{ hashFiles('pyproject.toml') }}

      - name: Instalar dependencias
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: make lint

      - name: Tests (pytest)
        run: make test

      - name: dbt (parse)
        run: make dbt-parse
